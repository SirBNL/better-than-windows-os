name: Build Better Than Windows OS ISO
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 120
    steps:
      - name: Install prerequisites (git for checkout + live-build toolchain)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl dos2unix \
            live-build debootstrap debian-archive-keyring \
            xorriso squashfs-tools mtools dosfstools \
            isolinux syslinux-common syslinux \
            grub-pc-bin grub-efi-amd64-bin

      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk space
        run: df -h

      - name: Normalize line endings & permissions
        run: |
          find auto config -type f -print0 | xargs -0 dos2unix -q || true
          chmod +x auto/config config/hooks/normal/*.hook.chroot || true

      - name: Build ISO
        run: |
          lb config
          lb build
          ls -lh *.iso

      - name: Prepare ISO artifact
        run: |
          ISO=$(ls *.iso | head -n1)
          cp "$ISO" better-than-windows-os.iso
          chmod a+r better-than-windows-os.iso
          sha256sum better-than-windows-os.iso | tee better-than-windows-os.iso.sha256
          ls -lh better-than-windows-os.iso

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: Better Than Windows OS v1.0
          body: |
            Live ISO of **Better Than Windows OS** (Debian Bookworm + XFCE, Windows 7 look-and-feel).
            Boot it in a VM (qemu/VirtualBox) or write to USB with Rufus/balenaEtcher.
          files: |
            better-than-windows-os.iso
            better-than-windows-os.iso.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ISO as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: better-than-windows-os-iso
          path: better-than-windows-os.iso
          retention-days: 7
          if-no-files-found: error
